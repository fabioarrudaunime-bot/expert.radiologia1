<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Validador de Certificados – EXPERT RADIOLOGIA</title>
<style>
  body{font-family:system-ui,Segoe UI,Inter,Roboto,Arial,sans-serif;background:#04123D;color:#fff;margin:0}
  .wrap{max-width:880px;margin:40px auto;padding:24px}
  h1{margin-top:0;font-size:28px}
  .card{background:#0b1c56;padding:20px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
  input[type="text"]{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px}
  button{padding:10px 18px;border:none;border-radius:10px;background:#39a0ff;color:#04123D;font-weight:600;cursor:pointer}
  .ok{color:#9bf2ad}.fail{color:#ffd2d2}
  .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
  .row{display:flex;gap:14px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .mt{margin-top:14px}
  small.hint{display:block;color:#cde6ff8c;margin-top:6px}
  a.mini{color:#cde6ff8c;text-decoration:underline;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Validador de Certificados – EXPERT RADIOLOGIA</h1>
  <div class="card">
    <p>Valide o certificado (Cole o código no campo abaixo)</p>
    <input id="data" type="text" placeholder="Cole aqui a URL inteira, o ?data=... ou o código base64/JSON" />
    <small class="hint">
      Dica: a validação exige o <b>pacote completo</b> (o mesmo que está embutido no QR). 
      O <i>ID</i> ou o <i>código de autenticidade</i> sozinho <b>não</b> bastam.
    </small>
    <div class="row">
      <button onclick="pasteFromClipboard()">Colar código</button>
      <button onclick="check()">Validar</button>
      <a class="mini" onclick="auto()">Usar ?data da URL</a>
    </div>
    <div id="out" class="mt"></div>
  </div>
</div>

<script src="https://unpkg.com/tweetnacl@1.0.3/nacl-fast.min.js"></script>
<script>
/** COLE AQUI SUA CHAVE PÚBLICA (Base64) gerada pelo Python */
const PUBKEY_B64 = "QfbTDabOLx9CxdAOEMiDOKnke37fbmY+IKCJS/d/ex4=";

/* Utils Base64URL */
function b64urlToBytes(b64url){
  const pad = "=".repeat((4 - b64url.length % 4) % 4);
  const b64 = (b64url + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b64);
  const arr = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

function tryParseJSON(str){ try{ return JSON.parse(str); }catch(_){ return null; } }

function decodeDataParam(dataParam){
  // 1) tenta base64url -> JSON
  try{
    const jsonStr = new TextDecoder().decode(b64urlToBytes(dataParam));
    const obj = tryParseJSON(jsonStr);
    if(obj) return obj;
  }catch(_){}
  // 2) tenta JSON direto
  const obj = tryParseJSON(dataParam);
  if(obj) return obj;
  return null;
}

function extractDataFromAny(raw){
  if(!raw) return null;
  let txt = raw.trim();
  // URL completa?
  try{
    const u = new URL(txt);
    const p = u.searchParams.get("data");
    if(p) return p;
  }catch(_){}
  // Trecho contendo ?data=...
  const m = txt.match(/[?&]data=([^&#\s]+)/i);
  if(m && m[1]) return decodeURIComponent(m[1]);
  // senão, considera o próprio texto (base64/JSON)
  return txt;
}

function shortCode(sigB64u){
  const sig = b64urlToBytes(sigB64u);
  return crypto.subtle.digest("SHA-256", sig).then(buf=>{
    const bytes = new Uint8Array(buf);
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
    let bits = 0, value = 0, output = "";
    for (let i=0;i<bytes.length;i++){
      value = (value << 8) | bytes[i];
      bits += 8;
      while(bits >= 5){
        output += alphabet[(value >>> (bits - 5)) & 31];
        bits -= 5;
      }
    }
    return output.replace(/=+$/,"").slice(0,10);
  });
}

async function verifyPayload(pack){
  if(!pack) throw new Error("PACOTE_INVALIDO");
  if(!pack.s) throw new Error("SEM_ASSINATURA");
  const {s, ...payload} = pack;
  const msg = new TextEncoder().encode(JSON.stringify(payload));
  const sig = b64urlToBytes(s);
  const pub = Uint8Array.from(atob(PUBKEY_B64),(c)=>c.charCodeAt(0));
  const ok = nacl.sign.detached.verify(msg, sig, pub);
  const sc = await shortCode(s);
  return {ok, payload, signature:s, code:sc};
}

function renderResult(res){
  const out = document.getElementById("out");
  if(!res.ok){
    out.innerHTML = `<p class="fail"><b>Inválido</b> – assinatura não confere (chave pública incorreta ou dados alterados).</p>`;
    return;
  }
  const p = res.payload;
  out.innerHTML = `
    <p class="ok"><b>Válido</b> – Assinatura verificada.</p>
    <p><b>Nome:</b> ${p.n}<br/>
       <b>Curso:</b> ${p.c}<br/>
       <b>Carga horária:</b> ${p.hrs} horas<br/>
       <b>Data de conclusão:</b> ${p.d}<br/>
       <b>ID:</b> <span class="mono">${p.id}</span><br/>
       <b>Código de autenticidade:</b> <span class="mono">${res.code}</span>
    </p>
  `;
}

async function check(){
  const input = document.getElementById("data");
  const raw = input.value.trim();
  const maybeData = extractDataFromAny(raw);
  if(!maybeData){
    alert("Conteúdo vazio. Cole a URL completa (com ?data=...) ou o código longo.");
    return;
  }
  const pack = decodeDataParam(maybeData);
  if(!pack){
    alert("Código inválido: isso parece ser apenas o ID ou o código curto. Cole o pacote completo (o conteúdo do QR ou a URL com ?data=...).");
    return;
  }
  try{
    const res = await verifyPayload(pack);
    renderResult(res);
  }catch(e){
    if(e.message === "SEM_ASSINATURA"){
      alert("Pacote sem assinatura. Cole o conteúdo completo que vem do QR (deve haver o campo 's').");
    }else if(e.message === "PACOTE_INVALIDO"){
      alert("Pacote inválido. Cole a URL completa (com ?data=...) ou o base64/JSON gerado junto ao QR.");
    }else{
      alert("Erro na verificação: " + e.message);
    }
  }
}

function auto(){
  const url = new URL(window.location.href);
  const param = url.searchParams.get("data");
  if(!param){ alert("URL sem ?data=. Cole no campo acima e clique em Validar."); return; }
  document.getElementById("data").value = param;
  check();
}

async function pasteFromClipboard(){
  const input = document.getElementById("data");
  try{
    if (navigator.permissions && navigator.permissions.query) {
      try{ await navigator.permissions.query({name: "clipboard-read"}); }catch(_){}
    }
    const text = await navigator.clipboard.readText();
    if(!text){
      input.focus();
      alert("Área de transferência vazia. Tente Ctrl+V (ou ⌘V no Mac) após clicar no campo.");
      return;
    }
    input.value = extractDataFromAny(text);
    check();
  }catch(e){
    input.focus();
    alert("Não foi possível ler a área de transferência automaticamente.\nUse Ctrl+V (ou ⌘V) para colar no campo e clique em Validar.");
  }
}
</script>
</body>
</html>
